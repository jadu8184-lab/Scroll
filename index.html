<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Command</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ─── GLOBAL STYLES & GLASSMORPHISM ─── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      /* Elegant dark gradient background */
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      background-attachment: fixed;
      color: #ffffff; 
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    
    ::-webkit-scrollbar { width: 0; } /* Hide scrollbar for clean look */

    .app-container {
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      padding-bottom: 90px;
    }

    /* Core Glass Panel */
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Glass Inputs */
    .glass-input {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      width: 100%;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    .glass-input:focus {
      background: rgba(0, 0, 0, 0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }
    .glass-input::placeholder { color: rgba(255, 255, 255, 0.4); }
    .glass-input option { background: #203a43; color: #fff; }

    /* Glass Buttons */
    .glass-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .glass-btn:hover { background: rgba(255, 255, 255, 0.15); }
    .glass-btn:active { transform: scale(0.98); }
    .glass-btn.primary {
      background: rgba(56, 189, 248, 0.2);
      border-color: rgba(56, 189, 248, 0.4);
      color: #bae6fd;
    }
    .glass-btn.success {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.4);
      color: #bbf7d0;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(15, 32, 39, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px 24px 0 0;
      display: flex;
      z-index: 100;
      padding: 12px 8px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
    }
    .tab-btn.active {
      color: #fff;
    }
    .tab-btn span.icon { font-size: 22px; margin-bottom: 2px; }

    /* Progress Bars */
    .progress-track {
      height: 6px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.8), rgba(167, 139, 250, 0.8));
      border-radius: 8px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Cards */
    .card-flip { perspective: 1000px; height: 100%; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      backface-visibility: hidden; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 32px; 
      border-radius: 20px;
      text-align: center;
    }
    .card-back { transform: rotateY(180deg); }
    .swipe-card { touch-action: pan-y; user-select: none; }

    /* Typography & Utilities */
    .title-gradient {
      background: linear-gradient(to right, #e0f2fe, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .stat-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── CONSTANTS ───────────────────────────────────────────────────────────────
    const TARGET_DATE = new Date("2026-05-24T00:00:00");
    const SUBJECTS = ["History", "Geography", "Polity", "Economy", "Science", "Environment", "CSAT", "Current Affairs"];
    const INTENSITY_TAGS = [
      { id: "active_recall", label: "Active Recall", color: "239, 68, 68" }, // rgb values for rgba integration
      { id: "practice_qs", label: "Practice Qs", color: "249, 115, 22" },
      { id: "note_taking", label: "Note Taking", color: "234, 179, 8" },
      { id: "passive_read", label: "Passive Read", color: "59, 130, 246" },
      { id: "revision", label: "Revision", color: "139, 92, 246" },
    ];
    const DAILY_GOAL = 8;
    const COUNTER_OFFENSIVE_GOAL = 10;
    const RETREAT_WINDOW_HOURS = 48;

    // ─── INITIAL STATE ────────────────────────────────────────────────────────────
    const getInitialState = () => {
      try {
        const saved = localStorage.getItem("studycommand_v2");
        if (saved) return JSON.parse(saved);
      } catch {}
      return {
        sessions: [],
        streak: 0,
        longestStreak: 0,
        tacticalRetreat: null,
        tokens: [],
        tokenHistory: [],
        flashcards: [
          { id: 1, front: "What is the Preamble of the Indian Constitution?", back: "We, the People of India, having solemnly resolved to constitute India into a Sovereign Socialist Secular Democratic Republic...", subject: "Polity", type: "text", interval: 1, nextReview: Date.now(), easeFactor: 2.5, reviewed: false },
          { id: 2, front: "Name the Five Permanent Members of the UN Security Council", back: "USA, UK, France, Russia, China — collectively known as P5", subject: "History", type: "text", interval: 1, nextReview: Date.now(), easeFactor: 2.5, reviewed: false },
          { id: 3, front: "What is the Tropic of Cancer?", back: "Latitude 23.5°N — passes through Rajasthan, Gujarat, MP, Chhattisgarh, Jharkhand, West Bengal, Tripura, Mizoram in India", subject: "Geography", type: "text", interval: 1, nextReview: Date.now(), easeFactor: 2.5, reviewed: false },
        ],
        lastAwardCheck: null,
      };
    };

    // ─── SPACED REPETITION (SM-2) ────────────────────────────────────────────────
    const sm2 = (card, quality) => {
      const ef = Math.max(1.3, card.easeFactor + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
      const interval = quality < 3 ? 1 : quality === 3 ? 1 : Math.round(card.interval * ef);
      return {
        ...card,
        easeFactor: ef,
        interval,
        nextReview: Date.now() + interval * 24 * 60 * 60 * 1000,
        reviewed: true,
      };
    };

    // ─── TIME HELPERS ─────────────────────────────────────────────────────────────
    const todayKey = () => new Date().toISOString().slice(0, 10);
    const getTodaySessions = (sessions) => sessions.filter(s => s.date === todayKey());
    const getTodayHours = (sessions) => getTodaySessions(sessions).reduce((a, s) => a + s.hours, 0);
    const formatCountdown = (ms) => {
      if (ms <= 0) return { d: "00", h: "00", m: "00", s: "00" };
      const s = Math.floor(ms / 1000) % 60;
      const m = Math.floor(ms / 60000) % 60;
      const h = Math.floor(ms / 3600000) % 24;
      const d = Math.floor(ms / 86400000);
      return { d: String(d).padStart(2, "0"), h: String(h).padStart(2, "0"), m: String(m).padStart(2, "0"), s: String(s).padStart(2, "0") };
    };

    // ─── MAIN APP COMPONENT ───────────────────────────────────────────────────────
    function App() {
      const [state, setState] = useState(getInitialState);
      const [tab, setTab] = useState("clock");
      const [now, setNow] = useState(Date.now());

      useEffect(() => {
        try { localStorage.setItem("studycommand_v2", JSON.stringify(state)); } catch {}
      }, [state]);

      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        const today = todayKey();
        if (state.lastAwardCheck === today) return;
        const todayHours = getTodayHours(state.sessions);
        const newTokens = [];

        if (todayHours >= DAILY_GOAL) {
          const alreadyAwarded = state.tokens.some(t => t.type === "daily" && t.date === today) ||
            state.tokenHistory.some(t => t.type === "daily" && t.date === today);
          if (!alreadyAwarded) {
            newTokens.push({ id: Date.now() + 1, type: "daily", label: "1-Hour Break", emoji: "📺", date: today, spent: false });
            newTokens.push({ id: Date.now() + 2, type: "daily2", label: "2-Hour Leisure", emoji: "🎮", date: today, spent: false });
          }
        }
        if (state.streak >= 7 && state.streak % 7 === 0) {
          const weekKey = Math.floor(state.streak / 7);
          const alreadyAwarded = state.tokens.some(t => t.type === "weekly" && t.weekKey === weekKey) ||
            state.tokenHistory.some(t => t.type === "weekly" && t.weekKey === weekKey);
          if (!alreadyAwarded) newTokens.push({ id: Date.now() + 3, type: "weekly", label: "Special Meal", emoji: "🍽️", date: today, weekKey, spent: false });
        }
        if (state.streak >= 30 && state.streak % 30 === 0) {
          const monthKey = Math.floor(state.streak / 30);
          const alreadyAwarded = state.tokens.some(t => t.type === "monthly" && t.monthKey === monthKey) ||
            state.tokenHistory.some(t => t.type === "monthly" && t.monthKey === monthKey);
          if (!alreadyAwarded) newTokens.push({ id: Date.now() + 4, type: "monthly", label: "Movie/Event Pass", emoji: "🎬", date: today, monthKey, spent: false });
        }

        if (newTokens.length > 0) {
          setState(s => ({ ...s, tokens: [...s.tokens, ...newTokens], lastAwardCheck: today }));
        } else {
          setState(s => ({ ...s, lastAwardCheck: today }));
        }
      }, [state.streak, state.sessions]);

      const msLeft = Math.max(0, TARGET_DATE - now);
      const countdown = formatCountdown(msLeft);
      const todayHours = getTodayHours(state.sessions);
      const unspentTokens = state.tokens.filter(t => !t.spent);

      const addSession = useCallback((subject, hours, intensity) => {
        setState(s => {
          const newSessions = [...s.sessions, { id: Date.now(), date: todayKey(), subject, hours, intensity, ts: Date.now() }];
          const newTodayHours = newSessions.filter(x => x.date === todayKey()).reduce((a, x) => a + x.hours, 0);
          let { streak, longestStreak, tacticalRetreat } = s;

          if (newTodayHours >= DAILY_GOAL && s.sessions.filter(x => x.date === todayKey()).reduce((a, x) => a + x.hours, 0) < DAILY_GOAL) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yk = yesterday.toISOString().slice(0, 10);
            const yesterdayHours = s.sessions.filter(x => x.date === yk).reduce((a, x) => a + x.hours, 0);
            if (yesterdayHours >= DAILY_GOAL || streak === 0) {
              streak += 1;
              longestStreak = Math.max(streak, longestStreak);
              tacticalRetreat = null;
            }
          }

          if (tacticalRetreat && newTodayHours >= COUNTER_OFFENSIVE_GOAL) {
            const windowOk = (Date.now() - tacticalRetreat.startedAt) < RETREAT_WINDOW_HOURS * 3600000;
            if (windowOk) {
              streak = tacticalRetreat.streakBefore + 1;
              longestStreak = Math.max(streak, longestStreak);
              tacticalRetreat = null;
            }
          }

          return { ...s, sessions: newSessions, streak, longestStreak, tacticalRetreat };
        });
      }, []);

      const redeemToken = useCallback((id) => {
        setState(s => {
          const token = s.tokens.find(t => t.id === id);
          if (!token) return s;
          return {
            ...s,
            tokens: s.tokens.filter(t => t.id !== id),
            tokenHistory: [...s.tokenHistory, { ...token, spent: true, redeemedAt: Date.now() }],
          };
        });
      }, []);

      const updateFlashcard = useCallback((updated) => {
        setState(s => ({ ...s, flashcards: s.flashcards.map(c => c.id === updated.id ? updated : c) }));
      }, []);

      const addFlashcard = useCallback((card) => {
        setState(s => ({ ...s, flashcards: [...s.flashcards, { ...card, id: Date.now(), interval: 1, nextReview: Date.now(), easeFactor: 2.5, reviewed: false }] }));
      }, []);

      const importCSV = useCallback((text) => {
        const lines = text.trim().split("\n").slice(1);
        const cards = lines.map((line, i) => {
          const [front, back, subject = "General"] = line.split(",").map(s => s.replace(/^"|"$/g, "").trim());
          return { id: Date.now() + i, front, back, subject, type: "text", interval: 1, nextReview: Date.now(), easeFactor: 2.5, reviewed: false };
        }).filter(c => c.front && c.back);
        setState(s => ({ ...s, flashcards: [...s.flashcards, ...cards] }));
        return cards.length;
      }, []);

      const TABS = [
        { id: "clock", icon: "⏱", label: "Dashboard" },
        { id: "log", icon: "📊", label: "Deploy" },
        { id: "cards", icon: "🃏", label: "Intel" },
        { id: "armory", icon: "🏆", label: "Rewards" },
      ];

      return (
        <div className="app-container">
          {tab === "clock" && <ClockView countdown={countdown} msLeft={msLeft} todayHours={todayHours} streak={state.streak} longestStreak={state.longestStreak} tacticalRetreat={state.tacticalRetreat} sessions={state.sessions} now={now} />}
          {tab === "log" && <LogView addSession={addSession} sessions={state.sessions} todayHours={todayHours} tacticalRetreat={state.tacticalRetreat} />}
          {tab === "cards" && <CardsView flashcards={state.flashcards} updateFlashcard={updateFlashcard} addFlashcard={addFlashcard} importCSV={importCSV} />}
          {tab === "armory" && <ArmoryView tokens={unspentTokens} tokenHistory={state.tokenHistory} redeemToken={redeemToken} streak={state.streak} />}

          <div className="bottom-nav">
            {TABS.map(t => (
              <button key={t.id} className={`tab-btn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                <span className="icon">{t.icon}</span>
                {t.label}
                {t.id === "armory" && unspentTokens.length > 0 && (
                  <span style={{ position: "absolute", top: 4, right: 18, background: "#38bdf8", color: "#0f2027", borderRadius: "50%", width: 14, height: 14, fontSize: 9, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800 }}>{unspentTokens.length}</span>
                )}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ─── DASHBOARD (CLOCK) VIEW ───────────────────────────────────────────────────
    function ClockView({ countdown, msLeft, todayHours, streak, longestStreak, tacticalRetreat, sessions, now }) {
      const progress = Math.min(1, todayHours / DAILY_GOAL);
      const daysElapsed = Math.floor((now - new Date("2025-06-01")) / 86400000);
      const totalDays = Math.floor((TARGET_DATE - new Date("2025-06-01")) / 86400000);
      const campaignProgress = Math.max(0, Math.min(1, daysElapsed / totalDays));

      const todaySubs = {};
      sessions.filter(s => s.date === todayKey()).forEach(s => {
        todaySubs[s.subject] = (todaySubs[s.subject] || 0) + s.hours;
      });

      return (
        <div style={{ padding: "24px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
            <div>
              <div className="subtitle">Study Command</div>
              <div className="title-gradient" style={{ fontSize: 20 }}>OPERATION: UPSC</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="subtitle">Streak</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: streak >= 7 ? "#38bdf8" : "#fff" }}>🔥 {streak}</div>
            </div>
          </div>

          {tacticalRetreat && (
            <div className="glass-panel" style={{ borderLeft: "4px solid #ef4444" }}>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <span style={{ fontSize: 24 }}>⚠️</span>
                <div>
                  <div style={{ fontSize: 11, color: "#fca5a5", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>Tactical Retreat Active</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 4 }}>Log {COUNTER_OFFENSIVE_GOAL}h today for Counter-Offensive to restore streak.</div>
                </div>
              </div>
            </div>
          )}

          <div className="glass-panel" style={{ textAlign: "center", padding: "30px 20px" }}>
            <div className="subtitle" style={{ marginBottom: 20 }}>
              {msLeft > 0 ? "Countdown to Prelims" : "Campaign Complete"}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
              {[["d", "Days"], ["h", "Hrs"], ["m", "Min"], ["s", "Sec"]].map(([k, label]) => (
                <div key={k}>
                  <div style={{ fontSize: 32, fontWeight: 800, color: "#fff", textShadow: "0 2px 10px rgba(255,255,255,0.2)" }}>{countdown[k]}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginTop: 6, textTransform: "uppercase", fontWeight: 600 }}>{label}</div>
                </div>
              ))}
            </div>
            
            <div className="progress-track" style={{ marginTop: 24 }}>
              <div className="progress-fill" style={{ width: `${campaignProgress * 100}%` }} />
            </div>
            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", marginTop: 8 }}>
              {Math.round(campaignProgress * 100)}% of timeline elapsed
            </div>
          </div>

          <div className="glass-panel">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div className="subtitle" style={{ margin: 0 }}>Today's Deployment</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: todayHours >= DAILY_GOAL ? "#4ade80" : "#fff" }}>
                {todayHours.toFixed(1)}h / {DAILY_GOAL}h
              </div>
            </div>
            
            <div className="progress-track" style={{ marginBottom: 16 }}>
              <div className="progress-fill" style={{ width: `${progress * 100}%`, background: todayHours >= DAILY_GOAL ? "rgba(74, 222, 128, 0.8)" : "" }} />
            </div>

            {Object.keys(todaySubs).length > 0 ? (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {Object.entries(todaySubs).map(([sub, hrs]) => (
                  <div key={sub} style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "6px 12px", fontSize: 11, color: "rgba(255,255,255,0.8)", fontWeight: 500 }}>
                    {sub} <span style={{ color: "#38bdf8", fontWeight: 700, marginLeft: 4 }}>{hrs}h</span>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", textAlign: "center", padding: "10px 0" }}>No deployment logged today.</div>
            )}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {[
              { label: "Best Streak", value: `${longestStreak} d`, icon: "🏆" },
              { label: "Total Sessions", value: sessions.length, icon: "📋" },
              { label: "Total Hours", value: `${sessions.reduce((a, s) => a + s.hours, 0).toFixed(0)}h`, icon: "⏱" },
              { label: "Days Left", value: countdown.d, icon: "📅" },
            ].map(stat => (
              <div key={stat.label} className="stat-box">
                <div style={{ fontSize: 18, marginBottom: 8 }}>{stat.icon}</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 4 }}>{stat.value}</div>
                <div className="subtitle" style={{ margin: 0 }}>{stat.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── DEPLOY (LOG) VIEW ────────────────────────────────────────────────────────
    function LogView({ addSession, sessions, todayHours, tacticalRetreat }) {
      const [subject, setSubject] = useState(SUBJECTS[0]);
      const [hours, setHours] = useState(1);
      const [intensity, setIntensity] = useState(INTENSITY_TAGS[0].id);
      const [success, setSuccess] = useState(false);

      const handleAdd = () => {
        if (hours <= 0 || hours > 16) return;
        addSession(subject, parseFloat(hours), intensity);
        setSuccess(true);
        setTimeout(() => setSuccess(false), 2000);
      };

      const recentSessions = [...sessions].reverse().slice(0, 20);
      const goalNeeded = tacticalRetreat ? COUNTER_OFFENSIVE_GOAL : DAILY_GOAL;
      const remaining = Math.max(0, goalNeeded - todayHours);

      return (
        <div style={{ padding: "24px 16px" }}>
          <div className="subtitle">Resource Allocation</div>
          <div className="title-gradient" style={{ fontSize: 20, marginBottom: 20 }}>DEPLOY HOURS</div>

          <div className="glass-panel">
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.7)", marginBottom: 10 }}>
              <span>TODAY: {todayHours.toFixed(1)}h / {goalNeeded}h</span>
              <span style={{ color: remaining === 0 ? "#4ade80" : "#38bdf8" }}>
                {remaining === 0 ? "✓ GOAL MET" : `${remaining.toFixed(1)}h remaining`}
              </span>
            </div>
            <div className="progress-track" style={{ marginBottom: 24 }}>
              <div className="progress-fill" style={{ width: `${Math.min(100, (todayHours / goalNeeded) * 100)}%`, background: remaining === 0 ? "rgba(74, 222, 128, 0.8)" : "" }} />
            </div>

            <div style={{ marginBottom: 16 }}>
              <div className="subtitle">Subject</div>
              <select className="glass-input" value={subject} onChange={e => setSubject(e.target.value)}>
                {SUBJECTS.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>

            <div style={{ marginBottom: 16 }}>
              <div className="subtitle">Hours to Deploy</div>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <input className="glass-input" type="number" min="0.5" max="16" step="0.5" value={hours} onChange={e => setHours(e.target.value)} style={{ flex: 1 }} />
                <div style={{ display: "flex", gap: 6 }}>
                  {[0.5, 1, 2, 3].map(h => (
                    <button key={h} onClick={() => setHours(h)} className="glass-btn" style={{ padding: "10px", width: "auto", background: hours === h ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.05)" }}>{h}h</button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{ marginBottom: 24 }}>
              <div className="subtitle">Cognitive Load</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {INTENSITY_TAGS.map(tag => (
                  <button key={tag.id} onClick={() => setIntensity(tag.id)} style={{ 
                    background: intensity === tag.id ? `rgba(${tag.color}, 0.2)` : "rgba(255,255,255,0.05)", 
                    border: `1px solid ${intensity === tag.id ? `rgba(${tag.color}, 0.4)` : "rgba(255,255,255,0.1)"}`, 
                    color: intensity === tag.id ? `rgb(${tag.color})` : "rgba(255,255,255,0.6)", 
                    borderRadius: 20, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.2s" 
                  }}>
                    {tag.label}
                  </button>
                ))}
              </div>
            </div>

            <button className={`glass-btn ${success ? "success" : "primary"}`} onClick={handleAdd}>
              {success ? "✓ DEPLOYED" : "⚡ DEPLOY HOURS"}
            </button>
          </div>

          <div className="subtitle" style={{ marginTop: 24, marginBottom: 12 }}>Deployment Log</div>
          {recentSessions.length === 0 && <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", textAlign: "center", padding: "20px" }}>No sessions logged yet.</div>}
          
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {recentSessions.map(s => {
              const tag = INTENSITY_TAGS.find(t => t.id === s.intensity);
              return (
                <div key={s.id} className="glass-panel" style={{ padding: "12px 16px", margin: 0, display: "flex", alignItems: "center", gap: 16 }}>
                  <div style={{ width: 4, height: 32, background: tag ? `rgb(${tag.color})` : "rgba(255,255,255,0.5)", borderRadius: 4, flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#fff", marginBottom: 4 }}>{s.subject}</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", fontWeight: 500 }}>{s.date} · {tag?.label || s.intensity}</div>
                  </div>
                  <div style={{ fontSize: 16, color: "#fff", fontWeight: 700 }}>{s.hours}h</div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── INTEL (CARDS) VIEW ───────────────────────────────────────────────────────
    function CardsView({ flashcards, updateFlashcard, addFlashcard, importCSV }) {
      const [mode, setMode] = useState("review"); 
      const [cardIndex, setCardIndex] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [newCard, setNewCard] = useState({ front: "", back: "", subject: SUBJECTS[0], type: "text" });
      const [csvText, setCsvText] = useState("");
      const [importMsg, setImportMsg] = useState("");

      const dueCards = flashcards.filter(c => c.nextReview <= Date.now());
      const currentCard = dueCards[cardIndex % Math.max(1, dueCards.length)];

      const touchStartX = useRef(null);
      const touchStartY = useRef(null);

      const handleSwipe = (direction) => {
        if (!currentCard) return;
        const quality = direction === "right" ? 4 : 1;
        updateFlashcard(sm2(currentCard, quality));
        setFlipped(false);
        setTimeout(() => setCardIndex(i => i + 1), 200);
      };

      const onTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      };

      const onTouchEnd = (e) => {
        if (!touchStartX.current) return;
        const dx = e.changedTouches[0].clientX - touchStartX.current;
        const dy = e.changedTouches[0].clientY - touchStartY.current;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
          handleSwipe(dx > 0 ? "right" : "left");
        } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
          setFlipped(f => !f);
        }
        touchStartX.current = null;
      };

      const handleImport = () => {
        const count = importCSV(csvText);
        setImportMsg(`✓ Imported ${count} cards`);
        setCsvText("");
        setTimeout(() => setImportMsg(""), 3000);
      };

      return (
        <div style={{ padding: "24px 16px" }}>
          <div className="subtitle">Intelligence & Revision</div>
          <div className="title-gradient" style={{ fontSize: 20, marginBottom: 20 }}>FLASHCARD INTEL</div>

          <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
            {[["review", "📖 Review"], ["add", "➕ Add"], ["import", "📥 Import"]].map(([m, label]) => (
              <button key={m} onClick={() => setMode(m)} className="glass-btn" style={{ flex: 1, padding: "8px", background: mode === m ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.05)" }}>
                {label}
              </button>
            ))}
          </div>

          {mode === "review" && (
            <div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginBottom: 16, textAlign: "center", fontWeight: 500 }}>
                {dueCards.length} cards due · Tap to flip · Swipe to judge
              </div>
              
              {dueCards.length === 0 ? (
                <div className="glass-panel" style={{ textAlign: "center", padding: "50px 20px" }}>
                  <div style={{ fontSize: 40, marginBottom: 16 }}>✨</div>
                  <div style={{ fontSize: 16, color: "#4ade80", fontWeight: 700, marginBottom: 8 }}>All caught up!</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Return tomorrow for new reviews.</div>
                </div>
              ) : (
                <>
                  <div className="swipe-card" style={{ height: 340 }} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onClick={() => setFlipped(f => !f)}>
                    <div className="card-flip">
                      <div className={`card-inner ${flipped ? "flipped" : ""}`}>
                        
                        {/* Front */}
                        <div className="card-face glass-panel" style={{ margin: 0, border: "1px solid rgba(255,255,255,0.2)" }}>
                          <div className="subtitle" style={{ marginBottom: 16, color: "#38bdf8" }}>{currentCard?.subject}</div>
                          <div style={{ fontSize: 18, color: "#fff", lineHeight: 1.5, fontWeight: 500 }}>{currentCard?.front}</div>
                          <div style={{ position: "absolute", bottom: 20, fontSize: 11, color: "rgba(255,255,255,0.4)" }}>Tap to reveal</div>
                        </div>
                        
                        {/* Back */}
                        <div className="card-face card-back glass-panel" style={{ margin: 0, background: "rgba(56, 189, 248, 0.05)", border: "1px solid rgba(56, 189, 248, 0.3)" }}>
                          <div className="subtitle" style={{ marginBottom: 16, color: "#38bdf8" }}>Answer</div>
                          <div style={{ fontSize: 16, color: "#fff", lineHeight: 1.6 }}>{currentCard?.back}</div>
                        </div>

                      </div>
                    </div>
                  </div>

                  <div style={{ display: "flex", gap: 16, marginTop: 24 }}>
                    <button onClick={() => handleSwipe("left")} className="glass-btn" style={{ flex: 1, background: "rgba(239, 68, 68, 0.1)", border: "1px solid rgba(239, 68, 68, 0.3)", color: "#fca5a5" }}>
                      ← Miss
                    </button>
                    <button onClick={() => setFlipped(f => !f)} className="glass-btn" style={{ flex: 0.8 }}>
                      Flip
                    </button>
                    <button onClick={() => handleSwipe("right")} className="glass-btn" style={{ flex: 1, background: "rgba(34, 197, 94, 0.1)", border: "1px solid rgba(34, 197, 94, 0.3)", color: "#bbf7d0" }}>
                      Known →
                    </button>
                  </div>
                  <div style={{ textAlign: "center", fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 16, fontWeight: 600 }}>
                    {(cardIndex % dueCards.length) + 1} / {dueCards.length} due
                  </div>
                </>
              )}
            </div>
          )}

          {mode === "add" && (
            <div className="glass-panel">
              <div style={{ marginBottom: 16 }}>
                <div className="subtitle">Subject</div>
                <select className="glass-input" value={newCard.subject} onChange={e => setNewCard(c => ({ ...c, subject: e.target.value }))}>
                  {SUBJECTS.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div style={{ marginBottom: 16 }}>
                <div className="subtitle">Question (Front)</div>
                <textarea className="glass-input" rows={4} value={newCard.front} onChange={e => setNewCard(c => ({ ...c, front: e.target.value }))} placeholder="Enter concept..." style={{ resize: "none" }} />
              </div>
              <div style={{ marginBottom: 24 }}>
                <div className="subtitle">Answer (Back)</div>
                <textarea className="glass-input" rows={4} value={newCard.back} onChange={e => setNewCard(c => ({ ...c, back: e.target.value }))} placeholder="Enter answer..." style={{ resize: "none" }} />
              </div>
              <button className="glass-btn primary" onClick={() => { if (newCard.front && newCard.back) { addFlashcard(newCard); setNewCard({ front: "", back: "", subject: SUBJECTS[0], type: "text" }); } }}>
                ➕ ADD CARD
              </button>
            </div>
          )}

          {mode === "import" && (
            <div className="glass-panel">
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginBottom: 16, lineHeight: 1.6 }}>
                Paste CSV formatted text.<br />
                Format: <span style={{ color: "#38bdf8", fontWeight: 700 }}>front,back,subject</span>
              </div>
              <textarea className="glass-input" rows={8} value={csvText} onChange={e => setCsvText(e.target.value)} placeholder={`"What is X?","X is...","Polity"\n"Define Y","Y means...","Economy"`} style={{ marginBottom: 16, resize: "none" }} />
              {importMsg && <div style={{ fontSize: 12, color: "#4ade80", marginBottom: 12, fontWeight: 600 }}>{importMsg}</div>}
              <button className="glass-btn primary" onClick={handleImport}>📥 IMPORT CSV</button>
            </div>
          )}
        </div>
      );
    }

    // ─── REWARDS (ARMORY) VIEW ────────────────────────────────────────────────────
    function ArmoryView({ tokens, tokenHistory, redeemToken, streak }) {
      const [deploying, setDeploying] = useState(null);

      const handleDeploy = (id) => {
        setDeploying(id);
        setTimeout(() => {
          redeemToken(id);
          setDeploying(null);
        }, 800);
      };

      const nextMilestones = [
        { label: "7-Day Streak", target: 7, current: streak % 7, reward: "Special Meal 🍽️" },
        { label: "30-Day Streak", target: 30, current: streak % 30, reward: "Movie Pass 🎬" },
      ];

      return (
        <div style={{ padding: "24px 16px" }}>
          <div className="subtitle">Reward Vault</div>
          <div className="title-gradient" style={{ fontSize: 20, marginBottom: 8 }}>THE ARMORY</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginBottom: 24, fontWeight: 500 }}>{tokens.length} token{tokens.length !== 1 ? "s" : ""} available</div>

          <div style={{ marginBottom: 32 }}>
            <div className="subtitle" style={{ marginBottom: 12 }}>Mission Progress</div>
            {nextMilestones.map(m => (
              <div key={m.label} className="glass-panel" style={{ padding: "16px", marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10, alignItems: "flex-end" }}>
                  <div style={{ fontSize: 13, color: "#fff", fontWeight: 600 }}>{m.label} <span style={{ color: "rgba(255,255,255,0.5)", fontWeight: 400, marginLeft: 4 }}>→ {m.reward}</span></div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", fontWeight: 700 }}>{m.current} / {m.target}</div>
                </div>
                <div className="progress-track" style={{ height: 8 }}>
                  <div className="progress-fill" style={{ width: `${(m.current / m.target) * 100}%` }} />
                </div>
              </div>
            ))}
          </div>

          <div className="subtitle" style={{ marginBottom: 12 }}>Unspent Inventory</div>

          {tokens.length === 0 && (
            <div className="glass-panel" style={{ textAlign: "center", padding: "40px 20px", borderStyle: "dashed" }}>
              <div style={{ fontSize: 32, marginBottom: 12 }}>🎯</div>
              <div style={{ fontSize: 14, color: "#fff", fontWeight: 600, marginBottom: 4 }}>No tokens yet.</div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Hit daily goals and build streaks to earn rewards.</div>
            </div>
          )}

          {tokens.map(token => {
            const isDeploying = deploying === token.id;
            return (
              <div key={token.id} className="glass-panel" style={{ padding: "16px", display: "flex", alignItems: "center", gap: 16, opacity: isDeploying ? 0.5 : 1, transform: isDeploying ? "scale(0.97)" : "none", transition: "all 0.3s" }}>
                <div style={{ fontSize: 32, background: "rgba(255,255,255,0.1)", borderRadius: "50%", width: 56, height: 56, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {token.emoji}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 4 }}>{token.label}</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", fontWeight: 500 }}>Earned {token.date}</div>
                </div>
                <button className="glass-btn primary" style={{ width: "auto", padding: "8px 16px" }} onClick={() => handleDeploy(token.id)} disabled={isDeploying}>
                  {isDeploying ? "..." : "USE"}
                </button>
              </div>
            );
          })}

          {tokenHistory.length > 0 && (
            <div style={{ marginTop: 32 }}>
              <div className="subtitle" style={{ marginBottom: 12 }}>Campaign History</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[...tokenHistory].reverse().map(token => (
                  <div key={token.id + "_hist"} className="glass-panel" style={{ padding: "12px 16px", margin: 0, display: "flex", alignItems: "center", gap: 16, opacity: 0.5 }}>
                    <div style={{ fontSize: 20 }}>{token.emoji}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: "#fff", textDecoration: "line-through" }}>{token.label}</div>
                      <div style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", marginTop: 2 }}>Redeemed {new Date(token.redeemedAt).toLocaleDateString()}</div>
                    </div>
                    <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", fontWeight: 800, letterSpacing: "0.1em" }}>SPENT</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── MOUNT REACT APP ──────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
